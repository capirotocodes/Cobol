<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0c0f14;color:#c9d1d9;font-family:'JetBrains Mono',monospace}

.hl-green{color:#81c784;font-weight:600}

.tabs{display:flex;gap:7px;margin-bottom:28px;overflow-x:auto;padding-bottom:6px}
.tab{padding:9px 14px;border:1px solid #1a1f2b;border-radius:8px;background:#12161e;color:#6b7280;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;transition:all .25s;white-space:nowrap;display:flex;align-items:center;gap:7px}

.badge{font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;flex-shrink:0;margin-top:3px;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace}

<script>
const questions=[{category:"Migration & Modernization",icon:"\u27F6",accent:"#ff8a65",glow:"rgba(255,138,101,0.12)",desc:"The core of this role \u2014 migrating Micro Focus COBOL to a new platform within .NET/Azure.",items:[{q:"What does migrating COBOL from Micro Focus to a different platform involve?",a:"Migration is a structured, multi-phase process:\n\n1. DISCOVERY & DEPENDENCY ANALYSIS\n   \u2022 Inventory all COBOL programs, copybooks, and JCL\n   \u2022 Map program-to-program calls (CALL, XCTL, LINK)\n   \u2022 Identify file dependencies (sequential, indexed, VSAM)\n   \u2022 Catalog database connections (Oracle, DB2)\n   \u2022 Document MQ Series message flows\n   \u2022 List Micro Focus-specific extensions and directives\n\n2. CODE CONVERSION\n   \u2022 Adapt Micro Focus-specific syntax to target platform\n   \u2022 Handle DIALECT directives (DIALECT\"MF\" vs DIALECT\"ENTCOBOL\")\n   \u2022 Convert proprietary file handling to target equivalents\n   \u2022 Map Micro Focus CICS emulation to target transaction layer\n   \u2022 Translate JCL job streams to target scheduling mechanism\n\n3. DATA FILE MIGRATION\n   \u2022 Convert indexed files (Micro Focus .dat/.idx) to target format\n   \u2022 Migrate sequential flat files\n   \u2022 Handle character encoding differences (ASCII vs EBCDIC)\n   \u2022 Validate data integrity after migration (record counts, checksums)\n\n4. BUILD & RUNTIME CONFIGURATION\n   \u2022 Set up compile environment on target platform\n   \u2022 Configure runtime libraries and dependencies\n   \u2022 Establish connection strings for Oracle/database\n   \u2022 Configure MQ Series connectivity\n\n5. FUNCTIONAL VALIDATION\n   \u2022 This is where YOUR QA experience shines\n   \u2022 Compare output from source system vs target system\n   \u2022 Validate business logic produces identical results\n   \u2022 Test boundary cases, error handling, edge scenarios\n   \u2022 Performance/regression testing\n\nKey interview point: Emphasize that migration is NOT rewriting \u2014 it's converting and validating. The business logic stays the same, the platform changes."},{q:"What are common Micro Focus-specific extensions that need adapting during migration?",a:"Micro Focus adds several proprietary features beyond standard COBOL:\n\nCOMPILER DIRECTIVES:\n  \u2022 DIALECT \u2014 Controls which COBOL standard to follow\n    DIALECT\"MF\" = Micro Focus native\n    DIALECT\"ENTCOBOL\" = IBM Enterprise COBOL compatibility\n  \u2022 CHARSET \u2014 ASCII vs EBCDIC handling\n  \u2022 ASSIGN \u2014 File assignment behavior differs from IBM\n  \u2022 IDXFORMAT \u2014 Indexed file internal format (4, 8, etc.)\n\nFILE HANDLING DIFFERENCES:\n  \u2022 Micro Focus uses its own indexed file format (.dat/.idx)\n  \u2022 Line sequential files (LINE SEQUENTIAL) \u2014 MF extension, not in IBM\n  \u2022 File locking mechanisms differ from mainframe VSAM\n  \u2022 ORGANIZATION IS LINE SEQUENTIAL doesn't exist in IBM COBOL\n\nSCREEN SECTION:\n  \u2022 Micro Focus supports SCREEN SECTION for terminal I/O\n  \u2022 Not available in IBM Enterprise COBOL (uses CICS BMS maps)\n  \u2022 May need conversion to .NET UI components or web services\n\nDATA TYPES:\n  \u2022 COMP-5 (native binary) \u2014 Micro Focus extension\n    IBM uses COMP or COMP-4 for binary\n  \u2022 POINTER and PROCEDURE-POINTER handling differs\n  \u2022 Object-oriented COBOL syntax may differ between vendors\n\nCALL CONVENTIONS:\n  \u2022 Micro Focus CALL CONVENTION clause\n  \u2022 Interop with C, .NET, Java has MF-specific syntax\n  \u2022 BY VALUE behavior may differ\n\nRUNTIME BEHAVIOR:\n  \u2022 Micro Focus runtime (cobrun / cobrtx) vs target runtime\n  \u2022 Error handling and exception management\n  \u2022 File status code extensions (9/xxx codes are MF-specific)\n\nMigration approach: Create a mapping document of every MF-specific feature used, then find the equivalent in the target tool or refactor where no equivalent exists."},{q:"How do you ensure functional equivalence after migration?",a:"This is YOUR strongest area \u2014 lean into your QA expertise:\n\nVALIDATION STRATEGY:\n\n1. PARALLEL TESTING\n   \u2022 Run the same inputs through BOTH systems (source MF and target)\n   \u2022 Compare outputs byte-by-byte or field-by-field\n   \u2022 Any difference = potential migration defect\n   \u2022 Automate comparisons for large datasets\n\n2. TEST CASE CATEGORIES:\n\n   Functional:\n   \u2022 Happy path \u2014 normal business transactions\n   \u2022 All code paths \u2014 ensure every EVALUATE/IF branch is tested\n   \u2022 Calculations \u2014 financial amounts, rounding, precision\n   \u2022 Date handling \u2014 leap years, end of month, century boundaries\n\n   Data:\n   \u2022 Record counts in = records counts out\n   \u2022 Totals and checksums match\n   \u2022 Character encoding correct (special characters, accents)\n   \u2022 Packed decimal (COMP-3) precision preserved\n   \u2022 Signed fields handled correctly\n\n   Error Handling:\n   \u2022 Invalid input produces same error behavior\n   \u2022 File-not-found scenarios\n   \u2022 Database errors (record not found, deadlock)\n   \u2022 Boundary overflow conditions\n\n   Integration:\n   \u2022 MQ Series messages sent/received correctly\n   \u2022 Oracle queries return same result sets\n   \u2022 Batch job sequences execute in correct order\n   \u2022 Inter-program calls pass parameters correctly\n\n3. REGRESSION SUITE\n   \u2022 Build a permanent suite of test cases\n   \u2022 Run after every code change during migration\n   \u2022 Track pass/fail rates over time\n   \u2022 Document known differences with justification\n\n4. PRODUCTION VALIDATION\n   \u2022 Shadow testing \u2014 run migrated system alongside production\n   \u2022 Gradual cutover, not big-bang\n   \u2022 Rollback plan if issues found\n\nInterview tip: Frame your QA background as the critical skill for migration success. Code conversion is mechanical \u2014 validation is where projects succeed or fail."},{q:"What is the role of .NET in COBOL modernization?",a:"In this role, .NET is the TARGET platform:\n\nHOW COBOL RUNS ON .NET:\n  \u2022 COBOL source is compiled to MSIL (Microsoft Intermediate Language)\n  \u2022 Runs on the CLR (Common Language Runtime) like C# or VB.NET\n  \u2022 COBOL programs become .NET assemblies (.dll or .exe)\n  \u2022 Can call and be called by C#, VB.NET, F# code\n  \u2022 Deployed like any other .NET application\n\nWHY THIS MATTERS:\n  \u2022 COBOL logic is preserved \u2014 no rewrite needed\n  \u2022 Modern deployment: Windows Server, IIS, Azure\n  \u2022 Integration with .NET services, REST APIs, web frontends\n  \u2022 Standard DevOps tooling (CI/CD pipelines, NuGet packages)\n  \u2022 Cloud-native deployment on Azure\n\nINTEGRATION PATTERNS:\n  \u2022 COBOL program exposes business logic as a .NET class\n  \u2022 C# web API calls the COBOL class for processing\n  \u2022 Results returned as JSON to web or mobile clients\n  \u2022 Example flow:\n    Browser \u2192 REST API (C#) \u2192 COBOL business logic \u2192 Oracle DB\n\nWHAT YOU SHOULD KNOW:\n  \u2022 You don't need to be a C# expert\n  \u2022 Understand the concept: COBOL compiles to .NET, runs alongside C#\n  \u2022 Know basic terms: assembly, CLR, NuGet, IIS, Azure App Service\n  \u2022 Understand that COBOL data types map to .NET types\n  \u2022 PIC X(20) \u2192 string, PIC 9(9) COMP \u2192 int, etc.\n\nFOR THE INTERVIEW:\n  \u2022 \"I understand that the migration target is .NET, where COBOL compiles to managed code and integrates with modern services\"\n  \u2022 \"My role would be ensuring the COBOL business logic produces identical results in the new .NET environment\"\n  \u2022 \"I'm building familiarity with the .NET ecosystem while leveraging my deep COBOL and testing expertise\""},{q:"What is Azure and how does COBOL deploy there?",a:"Azure is Microsoft's cloud platform \u2014 the deployment target for this role:\n\nBASIC AZURE CONCEPTS:\n  \u2022 Cloud computing \u2014 servers, storage, databases hosted by Microsoft\n  \u2022 Pay-as-you-go instead of owning physical hardware\n  \u2022 Scalable \u2014 add more resources as needed\n  \u2022 Managed services \u2014 Microsoft handles infrastructure maintenance\n\nHOW COBOL DEPLOYS TO AZURE:\n  \u2022 COBOL compiled to .NET runs on Azure App Service (web apps)\n  \u2022 Batch jobs can run on Azure Functions or Azure Batch\n  \u2022 Database connects to Azure SQL or Oracle on Azure\n  \u2022 File storage uses Azure Blob Storage or Azure Files\n  \u2022 Message queues can use Azure Service Bus (replacing MQ Series)\n\nAZURE SERVICES YOU'LL LIKELY ENCOUNTER:\n  \u2022 Azure App Service \u2014 Hosts web applications (.NET)\n  \u2022 Azure DevOps \u2014 CI/CD pipelines for build and deploy\n  \u2022 Azure SQL Database \u2014 Managed database service\n  \u2022 Azure Blob Storage \u2014 File storage (replaces datasets)\n  \u2022 Azure Monitor / Datadog \u2014 Application monitoring\n  \u2022 Azure Virtual Machines \u2014 If running traditional server-based apps\n\nFOR THE INTERVIEW:\n  Don't pretend to be a cloud expert \u2014 instead say:\n  \"I understand Azure is the deployment target. My focus is ensuring the COBOL applications migrate correctly and function identically in the cloud environment. I'm actively learning Azure fundamentals.\"\n\n  Tip: Consider getting the free Azure Fundamentals (AZ-900) certification."}]},{category:"Micro Focus COBOL",icon:"\u25C6",accent:"#4fc3f7",glow:"rgba(79,195,247,0.12)",desc:"Technical depth on Micro Focus specifically \u2014 expect these questions.",items:[{q:"What are the key differences between Micro Focus COBOL and IBM Enterprise COBOL?",a:"The COBOL LANGUAGE is nearly identical. The ECOSYSTEM differs:\n\nDEVELOPMENT ENVIRONMENT:\n  IBM: TSO/ISPF green screen, SDSF, Endevor\n  MF:  Visual Studio, Eclipse, or command-line tools\n\nCOMPILATION:\n  IBM: Compile \u2192 Link-edit \u2192 Load module on z/OS\n  MF:  Compile to native code, .NET (MSIL), or Java (bytecode)\n\nFILE HANDLING:\n  IBM: VSAM (KSDS, ESDS, RRDS), sequential datasets, GDGs\n  MF:  Micro Focus indexed files (.dat/.idx), line sequential,\n       standard OS files. Can emulate VSAM via Enterprise Server.\n\nJOB CONTROL:\n  IBM: JCL (JOB, EXEC, DD statements)\n  MF:  Enterprise Server emulates JCL, or native OS scripting\n       (batch files, shell scripts, PowerShell)\n\nTRANSACTION PROCESSING:\n  IBM: CICS (native), IMS\n  MF:  Enterprise Server provides CICS emulation\n       Same EXEC CICS commands work, different engine underneath\n\nDATABASE:\n  IBM: DB2 (embedded SQL with precompiler)\n  MF:  Oracle, SQL Server, PostgreSQL, or DB2\n       Uses OpenESQL or Pro*COBOL for embedded SQL\n\nCHARACTER ENCODING:\n  IBM: EBCDIC (z/OS native)\n  MF:  ASCII (Windows/Linux native)\n       CHARSET directive controls behavior\n\nKEY TAKEAWAY: If you can write COBOL for one, you can write it for the other. The adjustment is tooling and environment, not language."},{q:"What is Micro Focus Enterprise Server and Enterprise Developer?",a:"Two products that usually go together:\n\nENTERPRISE DEVELOPER:\n  \u2022 The development environment (IDE integration)\n  \u2022 Plugins for Visual Studio or Eclipse\n  \u2022 COBOL editor with syntax highlighting, autocomplete\n  \u2022 Debugger \u2014 step through COBOL code graphically\n  \u2022 Compile COBOL to native, .NET, or JVM\n  \u2022 Copybook navigation and cross-reference\n  \u2022 Integrated source control (Git, TFS)\n  \u2022 Think of it as: \"ISPF replacement for distributed platforms\"\n\nENTERPRISE SERVER:\n  \u2022 The runtime environment\n  \u2022 Emulates mainframe services on Windows/Linux:\n    - JCL parsing and execution\n    - CICS transaction processing\n    - JES (Job Entry Subsystem) emulation\n    - VSAM file handling\n    - IMS database emulation\n  \u2022 Regions = like CICS regions on mainframe\n  \u2022 Administration via web console (ESCWA)\n  \u2022 Think of it as: \"z/OS emulator for Windows/Linux\"\n\nHOW THEY WORK TOGETHER:\n  Developer writes/compiles in Enterprise Developer\n  \u2192 Deploys to Enterprise Server for execution\n  \u2192 Enterprise Server handles JCL, CICS, file I/O\n  \u2192 Applications behave as if on a mainframe\n\nFOR THIS ROLE:\n  You're migrating AWAY from this setup to a new tool.\n  Understanding Enterprise Server/Developer helps you know\n  what the current system does, so you can map features\n  to the target platform correctly."},{q:"How does Micro Focus handle CICS emulation?",a:"Micro Focus Enterprise Server provides a CICS emulation layer:\n\nWHAT'S THE SAME:\n  \u2022 EXEC CICS SEND MAP / RECEIVE MAP \u2014 Same syntax\n  \u2022 EXEC CICS READ / WRITE / REWRITE / DELETE \u2014 Same file commands\n  \u2022 EXEC CICS LINK / XCTL / RETURN \u2014 Same program control\n  \u2022 COMMAREA \u2014 Same concept for passing data between programs\n  \u2022 BMS maps \u2014 Can import mainframe BMS macro definitions\n  \u2022 Pseudo-conversational model \u2014 Same RETURN TRANSID pattern\n  \u2022 EIBCALEN, EIBTRNID, EIBTRMID \u2014 Same EIB fields available\n\nWHAT'S DIFFERENT:\n  \u2022 Runs on Windows/Linux, not z/OS\n  \u2022 Regions configured via web admin (ESCWA), not CICS SIT\n  \u2022 Terminal emulation via web browser or 3270 emulator\n  \u2022 File resources mapped to OS files, not VSAM datasets\n  \u2022 Performance characteristics differ\n\nFOR MIGRATION:\n  When migrating away from Micro Focus, the CICS layer needs\n  careful attention:\n  \u2022 Map-based screens may convert to web UIs or APIs\n  \u2022 Transaction logic becomes .NET service calls\n  \u2022 COMMAREA data structures become method parameters\n  \u2022 Pseudo-conversational flow becomes stateless web requests\n\nYOUR QA ANGLE:\n  Testing CICS migration means verifying:\n  \u2022 Same screens produce same results\n  \u2022 Transaction integrity (commit/rollback behavior)\n  \u2022 Multi-user concurrency works correctly\n  \u2022 Error handling paths still function"}]},{category:"Oracle & MQ Series",icon:"\u25CF",accent:"#ef9a9a",glow:"rgba(239,154,154,0.12)",desc:"The role requires Oracle troubleshooting and MQ Series knowledge.",items:[{q:"How does COBOL connect to Oracle databases?",a:"Similar concept to DB2 embedded SQL, different implementation:\n\nEMBEDDED SQL (Pro*COBOL):\n  EXEC SQL\n     SELECT CUST_NAME, CUST_BALANCE\n       INTO :WS-CUST-NAME, :WS-CUST-BALANCE\n       FROM CUSTOMER\n      WHERE CUST_ID = :WS-CUST-ID\n  END-EXEC\n\n  The syntax looks almost identical to DB2 embedded SQL.\n  The precompiler is Pro*COBOL instead of DB2 precompiler.\n\nMICRO FOCUS OpenESQL:\n  \u2022 Micro Focus alternative to Pro*COBOL\n  \u2022 Uses EXEC SQL ... END-EXEC (same syntax)\n  \u2022 Configured via compiler directives\n  \u2022 Can target Oracle, SQL Server, PostgreSQL, etc.\n  \u2022 No separate precompile step \u2014 handled at compile time\n\nKEY ORACLE CONCEPTS:\n  \u2022 SQLCODE \u2014 Same concept as DB2 (0 = success)\n  \u2022 Oracle-specific: SQLCODE = 1403 = no data found\n    (DB2 uses +100 for the same condition)\n  \u2022 Cursors \u2014 DECLARE, OPEN, FETCH, CLOSE (identical pattern)\n  \u2022 COMMIT / ROLLBACK \u2014 Same behavior\n\nTROUBLESHOOTING ORACLE (role requirement):\n  \u2022 ORA-00001: Unique constraint violated (like DB2 -803)\n  \u2022 ORA-01403: No data found (like DB2 +100)\n  \u2022 ORA-00060: Deadlock detected (like DB2 -911)\n  \u2022 ORA-01017: Invalid username/password\n  \u2022 ORA-12154: TNS could not resolve connect identifier\n  \u2022 ORA-00942: Table or view does not exist\n\nYOUR DB2 KNOWLEDGE TRANSFERS:\n  The concepts are the same \u2014 embedded SQL, cursors, SQLCODEs,\n  commits, locking. Only the specific codes and tools differ."},{q:"What is MQ Series and how does COBOL interact with it?",a:"IBM MQ (formerly WebSphere MQ, originally MQSeries) is a\nmessage queuing middleware:\n\nWHAT IT DOES:\n  \u2022 Sends messages between applications reliably\n  \u2022 Guaranteed delivery \u2014 messages don't get lost\n  \u2022 Asynchronous \u2014 sender doesn't wait for receiver\n  \u2022 Decouples systems \u2014 sender and receiver don't need to be\n    running at the same time\n\nREAL-WORLD EXAMPLE:\n  Program A processes an order in COBOL\n  \u2192 Puts a message on queue ORDER.CONFIRM\n  \u2192 Program B (could be Java, C#, anything) picks it up\n  \u2192 Sends confirmation email to customer\n\n  If Program B is down, the message waits in the queue\n  until B comes back up. Nothing is lost.\n\nCOBOL INTERACTS VIA MQI (Message Queue Interface):\n  CALL 'MQCONN' USING WS-QM-NAME\n                       WS-HCONN\n                       WS-COMPCODE\n                       WS-REASON.\n\n  CALL 'MQOPEN'  USING ...  (open a queue)\n  CALL 'MQPUT'   USING ...  (send a message)\n  CALL 'MQGET'   USING ...  (receive a message)\n  CALL 'MQCLOSE' USING ...  (close a queue)\n  CALL 'MQDISC'  USING ...  (disconnect)\n\nKEY CONCEPTS:\n  \u2022 Queue Manager \u2014 The MQ server instance\n  \u2022 Queue \u2014 Where messages are stored (like a mailbox)\n  \u2022 Channel \u2014 Connection between queue managers\n  \u2022 Message \u2014 The data being sent (any format)\n  \u2022 MQMD \u2014 Message Descriptor (metadata: ID, timestamp, priority)\n  \u2022 Completion Code \u2014 0 = OK, 1 = Warning, 2 = Error\n  \u2022 Reason Code \u2014 Specific error (2033 = no message available,\n    2085 = unknown object name)\n\nFOR MIGRATION:\n  MQ connectivity must work on the target platform.\n  Options:\n  \u2022 MQ client libraries available for .NET\n  \u2022 Azure Service Bus as alternative to MQ\n  \u2022 REST-based MQ bridge for cloud integration\n  \u2022 Message format and content must be preserved exactly"},{q:"How do you troubleshoot Oracle query performance issues?",a:"Practical Oracle troubleshooting for a COBOL developer:\n\nSTEP 1 \u2014 IDENTIFY THE SLOW QUERY\n  \u2022 Check application logs or Datadog for slow transactions\n  \u2022 Look at the COBOL source to find the SQL statement\n  \u2022 Note which tables and columns are involved\n\nSTEP 2 \u2014 RUN EXPLAIN PLAN\n  EXPLAIN PLAN FOR\n     SELECT ... FROM CUSTOMER WHERE ...;\n  SELECT * FROM TABLE(DBMS_XPLAN.DISPLAY);\n\n  Look for:\n  \u2022 TABLE ACCESS FULL \u2014 Full table scan (usually bad)\n  \u2022 INDEX RANGE SCAN \u2014 Using an index (usually good)\n  \u2022 NESTED LOOPS vs HASH JOIN \u2014 Join method\n  \u2022 Cost and row estimates \u2014 Are they realistic?\n\nSTEP 3 \u2014 COMMON CAUSES AND FIXES\n\n  Missing Index:\n  \u2022 WHERE clause column has no index\n  \u2022 Fix: CREATE INDEX idx_cust_region ON CUSTOMER(REGION);\n\n  Implicit Type Conversion:\n  \u2022 COBOL host variable is PIC X(10) but column is NUMBER\n  \u2022 Oracle converts every row \u2014 kills index usage\n  \u2022 Fix: Match COBOL PIC clause to Oracle column type\n\n  Missing Statistics:\n  \u2022 Optimizer makes bad decisions with stale stats\n  \u2022 Fix: EXEC DBMS_STATS.GATHER_TABLE_STATS(...)\n\n  Lock Contention:\n  \u2022 Multiple programs updating same rows\n  \u2022 Check V$LOCKED_OBJECT and V$SESSION\n  \u2022 Fix: Optimize COMMIT frequency, review batch scheduling\n\nFOR THE INTERVIEW:\n  Show you approach performance systematically, not guessing."}]},{category:"ITIL & Service Management",icon:"\u25CE",accent:"#ce93d8",glow:"rgba(206,147,216,0.12)",desc:"The role requires ITIL knowledge \u2014 incident, problem, and change management.",items:[{q:"What is ITIL and how does it apply to this role?",a:"ITIL (Information Technology Infrastructure Library) is a\nframework for managing IT services. This role explicitly requires it.\n\nKEY ITIL PROCESSES FOR THIS ROLE:\n\n1. INCIDENT MANAGEMENT\n   \u2022 Goal: Restore normal service as quickly as possible\n   \u2022 An incident = something broke or isn't working right\n   \u2022 Example: COBOL batch job abended in production\n   \u2022 Your role: Identify the issue, apply a fix or workaround\n   \u2022 Priority based on Impact \u00D7 Urgency\n\n2. PROBLEM MANAGEMENT\n   \u2022 Goal: Find and fix the ROOT CAUSE to prevent recurrence\n   \u2022 A problem = the underlying cause of one or more incidents\n   \u2022 Your role: \"Identify recurring incidents and trigger\n     Problem management process\" (from the job description)\n   \u2022 Produce Root Cause Analysis (RCA) documentation\n\n3. CHANGE MANAGEMENT\n   \u2022 Goal: Ensure changes are controlled and don't break things\n   \u2022 All code changes go through a change approval process\n   \u2022 Critical for migration work \u2014 every converted program\n     is a change that needs approval\n\n4. CONTINUAL SERVICE IMPROVEMENT (CSI)\n   \u2022 \"Proactively identify trends, implement improvements\"\n     (directly from the job description)\n   \u2022 Analyze incident data for patterns\n   \u2022 Suggest process or code improvements\n\nYOUR QA BACKGROUND FITS:\n  Testing discipline aligns perfectly with ITIL's structured\n  approach. You already do impact analysis, validation, and\n  documentation \u2014 ITIL just gives it a formal framework."},{q:"How do you write a Root Cause Analysis (RCA)?",a:"RCA is a formal document explaining WHY something failed:\n\nSTRUCTURE:\n\n1. INCIDENT SUMMARY\n   \u2022 Date/time of occurrence\n   \u2022 Systems/services affected\n   \u2022 Business impact (users affected, revenue impact, SLA breach?)\n   \u2022 Duration of outage/degradation\n\n2. TIMELINE\n   \u2022 When was the issue detected?\n   \u2022 When was the team notified?\n   \u2022 What actions were taken and when?\n   \u2022 When was service restored?\n\n3. ROOT CAUSE\n   \u2022 Use the \"5 Whys\" technique:\n     Why did the batch job abend?\n       \u2192 S0C7 on field CUST-BALANCE\n     Why was CUST-BALANCE invalid?\n       \u2192 Input file had spaces in numeric field\n     Why did the input file have bad data?\n       \u2192 Upstream extract program had no validation\n     Why was there no validation?\n       \u2192 Original spec didn't require it\n     Why wasn't this caught before?\n       \u2192 No negative test cases in the test suite\n\n   Root Cause: Missing data validation in upstream\n   extract program, combined with insufficient test coverage.\n\n4. CORRECTIVE ACTIONS\n   Immediate fix:\n   \u2022 Added INSPECT REPLACING SPACES BY ZEROS before COMPUTE\n   \u2022 Restarted job from checkpoint\n\n   Permanent fix:\n   \u2022 Added data validation to upstream extract program\n   \u2022 Created negative test cases for invalid numeric data\n   \u2022 Added Datadog alert for file quality checks\n\n5. PREVENTIVE MEASURES\n   \u2022 Review all similar programs for same vulnerability\n   \u2022 Add data validation standards to coding guidelines\n   \u2022 Enhance QA regression suite"},{q:"What is Datadog and how is it used for monitoring COBOL applications?",a:"Datadog is a cloud-based monitoring and analytics platform.\nThe job listing says it's \"an advantage\" \u2014 basic knowledge is enough.\n\nWHAT DATADOG DOES:\n  \u2022 Monitors application performance in real-time\n  \u2022 Collects logs, metrics, and traces\n  \u2022 Creates dashboards and alerts\n  \u2022 Detects anomalies and performance issues\n\nHOW IT APPLIES TO COBOL MIGRATION:\n\n  Application Performance Monitoring (APM):\n  \u2022 Track response times of migrated COBOL services\n  \u2022 Compare performance: Micro Focus vs target platform\n  \u2022 Identify slow transactions or bottlenecks\n\n  Log Management:\n  \u2022 Centralize logs from COBOL batch jobs\n  \u2022 Search and filter across all applications\n  \u2022 Set up alerts: \"notify me if batch job X fails\"\n\n  Custom Metrics:\n  \u2022 Batch job execution time\n  \u2022 Record counts processed\n  \u2022 Error rates by program\n  \u2022 Queue depths for MQ Series\n\n  Alerting:\n  \u2022 \"Alert if batch job runs longer than 2 hours\"\n  \u2022 \"Alert if error rate exceeds 1%\"\n  \u2022 Routes to Slack, email, PagerDuty\n\nFOR THE INTERVIEW:\n  \"I understand Datadog is used for monitoring the health\n  and performance of applications. In the context of COBOL\n  migration, it would help us track whether migrated programs\n  perform as well as the originals and catch issues before\n  they become incidents.\""}]},{category:"Your QA & Batch Strengths",icon:"\u2605",accent:"#81c784",glow:"rgba(129,199,132,0.12)",desc:"Questions where your existing experience is the answer \u2014 own these confidently.",items:[{q:"Describe your experience with batch COBOL processing.",a:"Strong answer framework (adapt to your experience):\n\n\"In my role, I was responsible for QA testing and submitting batch COBOL programs. My typical workflow included:\n\n1. REVIEWING JCL \u2014 Before submitting, I'd verify dataset names, DISP parameters, step conditions, and STEPLIB/JOBLIB.\n\n2. SUBMITTING JOBS \u2014 Via TSO/ISPF or SDSF. Monitored execution checking job status (ACTIVE, OUTPUT, ABEND).\n\n3. VALIDATING OUTPUT:\n   \u2022 Check return codes (RC=0 good, RC=4 warning, RC=8+ error)\n   \u2022 Verify output files using FILE-AID or ISPF Browse\n   \u2022 Compare expected vs actual record counts\n   \u2022 Validate data content against test cases\n\n4. ABEND ANALYSIS \u2014 Check JESMSGLG for condition code, review dumps, report findings with abend code, step name, and root cause.\n\nCONNECT TO THIS ROLE:\n\"This systematic approach to testing and validation is exactly what's needed for migration validation. I know how to verify that a COBOL program produces correct output \u2014 whether it runs on a mainframe, Micro Focus, or a new platform.\""},{q:"How do you investigate an S0C7 abend?",a:"S0C7 (Data Exception) \u2014 #1 most common abend:\n\nSTEP 1 \u2014 SDSF/JESMSGLG\n   \u2022 Note failing step name and program\n   \u2022 Check if it's new or recurring\n\nSTEP 2 \u2014 SYSUDUMP/CEEDUMP\n   \u2022 Find the PSW offset\n   \u2022 Note the address where failure occurred\n\nSTEP 3 \u2014 Compiler listing\n   \u2022 Find the offset in the listing\n   \u2022 Identify the COBOL statement and data field\n\nSTEP 4 \u2014 Examine the data\n   \u2022 Browse input file with FILE-AID\n   \u2022 Common culprits:\n     - Spaces in a numeric (PIC 9) field\n     - Invalid packed decimal (COMP-3)\n     - Uninitialized WORKING-STORAGE fields\n     - Wrong COPYBOOK version\n\nSTEP 5 \u2014 Root cause and fix\n   \u2022 Bad input data \u2192 add validation or fix upstream\n   \u2022 Uninitialized field \u2192 add INITIALIZE or VALUE clause\n   \u2022 COPYBOOK mismatch \u2192 verify correct version\n\nCONNECT TO THIS ROLE:\n\"In migration, S0C7-type data exceptions can occur when data encoding changes (ASCII vs EBCDIC) or when field definitions don't match between source and target platforms. My debugging approach transfers directly.\""},{q:"How do you design test cases for a COBOL batch program?",a:"Structured test case design:\n\nCATEGORIES:\n\nPOSITIVE (Happy Path):\n  \u2022 Normal records processed correctly\n  \u2022 Transformations produce expected results\n  \u2022 Output counts and totals match\n\nBOUNDARY:\n  \u2022 Empty input file (0 records)\n  \u2022 Single record file\n  \u2022 Maximum field values\n  \u2022 Signed field min/max values\n\nNEGATIVE:\n  \u2022 Invalid data in key fields\n  \u2022 Spaces in numeric fields\n  \u2022 Duplicate keys\n  \u2022 Out-of-sequence records\n\nMIGRATION-SPECIFIC TEST CASES:\n  \u2022 Source system output vs target system output (must match)\n  \u2022 Character encoding validation (special chars, accents)\n  \u2022 Numeric precision (COMP-3 to .NET decimal conversion)\n  \u2022 Date format handling across platforms\n  \u2022 File locking behavior differences\n  \u2022 MQ message format preservation\n  \u2022 Oracle query results match original DB results\n\nThis last category is unique to migration testing and is\nwhere you add the most value in this role."}]},{category:"Behavioral & Role Fit",icon:"\u25C8",accent:"#ffd54f",glow:"rgba(255,213,79,0.12)",desc:"Questions about your fit for this specific migration developer role.",items:[{q:"Why are you a good fit for this Micro Focus COBOL migration role?",a:"Structure your answer around what the role needs:\n\n\"This role requires three things: COBOL knowledge, migration/validation skills, and communication. Here's what I bring:\n\nCOBOL KNOWLEDGE:\nI have hands-on experience with COBOL in a batch environment \u2014 reading programs, understanding JCL, debugging abends, working with file handling and database operations.\n\nMIGRATION & VALIDATION:\nMy QA background is arguably the most critical skill for migration work. Migration projects succeed or fail on validation \u2014 ensuring the converted code produces identical results. I've spent my career doing exactly this.\n\nCOMMUNICATION:\nThe role involves customer contact and cross-team collaboration. In QA, I've always worked between developers, operations, and business stakeholders \u2014 explaining technical issues in clear terms.\n\nGROWTH MINDSET:\nI'm actively learning the target-side technologies \u2014 .NET fundamentals, Azure concepts, Oracle \u2014 to complement my source-side COBOL expertise.\""},{q:"How would you approach your first 30-60-90 days in this role?",a:"Show you've thought about ramping up systematically:\n\nFIRST 30 DAYS \u2014 LEARN:\n  \u2022 Understand the customer's application landscape\n  \u2022 Study the current Micro Focus environment\n  \u2022 Review existing documentation and architecture diagrams\n  \u2022 Shadow team members on current migration activities\n  \u2022 Set up development environment and tools\n  \u2022 Learn the target platform/tool being migrated to\n  \u2022 Understand the ITIL processes used by the team\n\nDAYS 30-60 \u2014 CONTRIBUTE:\n  \u2022 Take on smaller migration tasks independently\n  \u2022 Start performing code conversion on simpler programs\n  \u2022 Build and execute validation test cases\n  \u2022 Participate in incident management rotation\n  \u2022 Begin producing RCA documents for issues I investigate\n\nDAYS 60-90 \u2014 OWN:\n  \u2022 Handle full migration cycles independently\n  \u2022 Propose improvements to testing and validation process\n  \u2022 Build reusable test suites for common migration patterns\n  \u2022 Share knowledge with team on areas where I add value\n\nCLOSE WITH:\n\"My goal in the first 90 days is to become the person the\nteam trusts for migration validation quality \u2014 because\nthat's where my experience adds the most immediate value.\""},{q:"Tell me about a time you identified a recurring problem and solved it.",a:"Use the STAR method \u2014 adapt to your real experience:\n\nSITUATION:\n\"In my QA role, I noticed that the same batch program was\nfailing with S0C7 roughly every month-end. Each time, the\ndeveloper would fix the specific bad record and rerun.\"\n\nTASK:\n\"I wanted to find the root cause and prevent it permanently,\nnot just keep fixing symptoms.\"\n\nACTION:\n\"I analyzed the last 6 occurrences and found a pattern:\n\u2022 All failures were on COMP-3 fields\n\u2022 All involved records from one specific upstream feed\n\u2022 The feed had a monthly refresh that occasionally\n  introduced records with spaces in numeric fields\n\nI documented the pattern with specific dates, record IDs,\nand field names. I proposed two changes:\n1. Add INSPECT REPLACING validation in the receiving program\n2. Add a data quality check job before the main process\n\nI worked with the developer to implement both changes and\ncreated test cases with intentionally bad data to verify.\"\n\nRESULT:\n\"The S0C7 abend never recurred. The data quality check\ncaught 15 invalid records over the next 3 months that\nwould have caused failures.\"\n\nCONNECT TO THE ROLE:\n\"This is exactly the 'identify recurring incidents and\ntrigger Problem management' responsibility in the job\ndescription. I already do this naturally.\""},{q:"How do you handle communication with non-technical customers?",a:"The role emphasizes customer contact and clear communication:\n\nFRAMEWORK:\n\n1. TRANSLATE TECHNICAL TO BUSINESS\n   Instead of: \"The COBOL program abended with S0C7 at\n   offset X'0003A2' because of an invalid packed decimal\n   in field CUST-BALANCE\"\n\n   Say: \"The billing program encountered a data quality\n   issue with a customer record. We've identified the\n   specific record, corrected it, and the process is\n   now running normally. We're adding a validation check\n   to prevent this from happening again.\"\n\n2. FOCUS ON IMPACT AND RESOLUTION\n   \u2022 What happened (briefly)\n   \u2022 What's affected\n   \u2022 What we're doing about it\n   \u2022 When it will be resolved\n   \u2022 What we'll do to prevent recurrence\n\n3. SET EXPECTATIONS FOR MIGRATION\n   \u2022 Regular progress updates with metrics\n   \u2022 \"We've migrated X of Y programs this sprint\"\n   \u2022 Clear communication about risks and dependencies\n   \u2022 Early warning if timelines are at risk\n\nFOR THE INTERVIEW:\n\"In QA, I regularly communicated with developers, project\nmanagers, and sometimes business users. I learned to\nadjust my language \u2014 detailed technical for developers,\nimpact-focused for managers, and outcome-focused for\nbusiness stakeholders.\""}]},{category:"COBOL Core Knowledge",icon:"\u25A3",accent:"#7986cb",glow:"rgba(121,134,203,0.12)",desc:"Fundamental COBOL questions they'll ask to verify your technical depth.",items:[{q:"Explain PIC clauses and level numbers.",a:"PIC (PICTURE) defines data type and size:\n\nNUMERIC:\n  PIC 9(5)         \u2014 5-digit integer\n  PIC 9(5)V99      \u2014 5 digits + implied decimal + 2 decimal\n  PIC S9(7)V99     \u2014 Signed numeric\n  PIC S9(5) COMP-3 \u2014 Packed decimal (efficient storage)\n  PIC S9(9) COMP   \u2014 Binary (fastest arithmetic)\n\nALPHANUMERIC:\n  PIC X(30)        \u2014 30 characters (any character)\n\nEDITED (display/reports):\n  PIC Z(5)9        \u2014 Zero-suppressed\n  PIC $ZZ,ZZ9.99   \u2014 Currency formatted\n\nLEVEL NUMBERS:\n  01 \u2014 Record level (top of hierarchy)\n  02-49 \u2014 Group or elementary items within a record\n  66 \u2014 RENAMES clause\n  77 \u2014 Standalone elementary item\n  88 \u2014 Condition name (boolean)\n\n  01 CUSTOMER-REC.\n     05 CUST-ID      PIC 9(8).\n     05 CUST-NAME    PIC X(30).\n     05 CUST-BAL     PIC S9(7)V99 COMP-3.\n     05 CUST-STATUS  PIC X(1).\n        88 ACTIVE    VALUE 'A'.\n        88 INACTIVE  VALUE 'I'.\n\nMIGRATION NOTE: PIC clauses map to .NET types during migration:\n  PIC X \u2192 string\n  PIC 9 COMP \u2192 int/long\n  PIC 9 COMP-3 \u2192 decimal"},{q:"Explain PERFORM, EVALUATE, and the key procedure division verbs.",a:"PERFORM \u2014 Main flow control:\n\n  Simple: PERFORM PARA-A.\n  Thru:   PERFORM PARA-A THRU PARA-A-EXIT.\n  Times:  PERFORM PARA-A 5 TIMES.\n  Until:  PERFORM PARA-A UNTIL WS-COUNT > 100.\n  Varying: PERFORM PARA-A VARYING WS-I FROM 1 BY 1\n              UNTIL WS-I > 10.\n  Inline:  PERFORM UNTIL WS-EOF\n              READ INPUT-FILE ...\n           END-PERFORM\n\nEVALUATE \u2014 COBOL's switch/case:\n  EVALUATE TRUE\n     WHEN TRANS-CODE = 'A'  PERFORM ADD-RECORD\n     WHEN TRANS-CODE = 'U'  PERFORM UPDATE-RECORD\n     WHEN TRANS-CODE = 'D'  PERFORM DELETE-RECORD\n     WHEN OTHER             PERFORM ERROR-ROUTINE\n  END-EVALUATE\n\nOTHER KEY VERBS:\n  MOVE \u2014 Assigns values\n  COMPUTE \u2014 Arithmetic: COMPUTE X = (A + B) * C / D\n  STRING \u2014 Concatenation\n  UNSTRING \u2014 Splitting strings\n  INSPECT \u2014 Count/replace characters\n  CALL \u2014 Invoke subprograms\n  SORT \u2014 Sort files with USING/GIVING or procedures\n\nSCOPE TERMINATORS (important for clean code):\n  END-IF, END-EVALUATE, END-PERFORM, END-READ,\n  END-WRITE, END-CALL, END-STRING\n\n  Always use explicit scope terminators \u2014 nested periods\n  are a common source of bugs that are hard to find."},{q:"What are the most important file status codes?",a:"Essential codes for any COBOL developer or tester:\n\nSUCCESS:\n  00 \u2014 Successful operation\n  02 \u2014 Success with duplicate alternate key\n  10 \u2014 End of file (normal condition)\n\nKEY ERRORS (Indexed files):\n  22 \u2014 Duplicate primary key on WRITE\n  23 \u2014 Record not found\n\nOPEN ERRORS:\n  35 \u2014 File not found\n  39 \u2014 DCB attributes mismatch (RECFM/LRECL conflict)\n\nLOGIC ERRORS:\n  41 \u2014 File already open\n  46 \u2014 READ after end of file\n  47 \u2014 READ on file not opened for INPUT\n\nMICRO FOCUS SPECIFIC:\n  9/xxx codes \u2014 Micro Focus extended file status\n  These are vendor-specific and may not exist on other platforms\n  Example: 9/065 = file locked by another process\n\n  During migration, these MF-specific codes need mapping to\n  equivalent error handling on the target platform.\n\nBEST PRACTICE:\n  Always check FILE STATUS after every I/O operation:\n\n  READ CUST-FILE\n  IF WS-FILE-STATUS NOT = '00' AND NOT = '10'\n     DISPLAY 'FILE ERROR: ' WS-FILE-STATUS\n     PERFORM ERROR-HANDLER\n  END-IF"}]}];

let activeCat=0;
const shown={};
const saved={};

function getTotalQ(){return questions.reduce((a,c)=>a+c.items.length,0)}
function getRevealed(){return Object.values(shown).filter(Boolean).length}
function getSaved(){return Object.values(saved).filter(Boolean).length}
function gIdx(ci,ii){return questions.slice(0,ci).reduce((a,c)=>a+c.items.length,0)+ii}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function render(){
  const cat=questions[activeCat];
  const totalQ=getTotalQ();
  const revealed=getRevealed();
  const savedCount=getSaved();
  const pct=totalQ?((revealed/totalQ)*100):0;

  let html=`
    <div style="margin-bottom:32px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="label" style="color:${cat.accent}">Micro Focus Migration Role</span>
        <span class="line" style="background:linear-gradient(to right,${cat.accent}40,transparent)"></span>
      </div>
      <h1>COBOL Migration Interview Q&A</h1>
      <p class="sub">Tailored for your <span class="hl-green">QA &amp; batch</span> background, targeting the <span class="hl-orange">Micro Focus \u2192 .NET/Azure migration</span> developer role \u2014 ${totalQ} questions across ${questions.length} areas.</p>
      <div class="stats">
        <div class="pb"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,${cat.accent},${cat.accent}88)"></div></div>
        <span class="chip"><span style="color:${cat.accent};font-weight:600">${revealed}</span>/${totalQ} studied</span>
        <span class="chip"><span style="color:#ffd54f;font-weight:600">${savedCount}</span> saved</span>
      </div>
    </div>
    <div class="tabs">`;

  questions.forEach((c,i)=>{
    const isOn=i===activeCat;
    html+=`<button class="tab${isOn?' on':''}" data-cat="${i}" style="--accent:${c.accent};--glow:${c.glow};${isOn?`border-color:${c.accent};color:${c.accent};background:${c.glow};`:''}"><span style="font-size:13px">${c.icon}</span>${esc(c.category)}</button>`;
  });

  html+=`</div>
    <div class="desc-box" style="border-left:3px solid ${cat.accent}"><div class="desc-text">${esc(cat.desc)}</div></div>
    <div class="cat-head">
      <span class="dot" style="background:${cat.accent};box-shadow:0 0 10px ${cat.accent}60"></span>
      <span class="cat-title">${esc(cat.category)}</span>
      <span class="cat-count">${cat.items.length}q</span>
    </div>`;

  cat.items.forEach((item,idx)=>{
    const gi=gIdx(activeCat,idx);
    const isOpen=shown[gi];
    const isBm=saved[gi];
    html+=`<div class="card${isBm?' bm':''}" style="--accent:${cat.accent};--glow:${cat.glow}">
      <div class="qh" data-toggle="${gi}">
        <span class="badge" style="color:${cat.accent};background:${cat.glow}">Q${idx+1}</span>
        <span class="qt">${esc(item.q)}</span>
        <div class="br">
          <button class="ab${isBm?' bmon':''}" data-bm="${gi}">${isBm?'\u2605':'\u2606'}</button>
          <button class="ab${isOpen?' on':''}" data-toggle="${gi}" style="${isOpen?`border-color:${cat.accent};color:${cat.accent};background:${cat.glow}`:''}">${isOpen?'HIDE':'SHOW'}</button>
        </div>
      </div>`;
    if(isOpen){
      html+=`<div class="ap"><div class="ac">${esc(item.a)}</div></div>`;
    }
    html+=`</div>`;
  });

  html+=`<div class="footer">
    <span style="font-family:'Outfit',sans-serif">Micro Focus COBOL Migration Developer \u2014 Interview Prep</span>
    <span>Practice each answer <span style="color:${cat.accent};font-weight:600">out loud in English</span></span>
  </div>`;

  document.getElementById('app').innerHTML=html;

  // Event listeners
  document.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.addEventListener('click',()=>{activeCat=parseInt(btn.dataset.cat);render()});
  });
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.dataset.bm!==undefined)return;
      const gi=parseInt(el.dataset.toggle);
      shown[gi]=!shown[gi];
      render();
    });
  });
  document.querySelectorAll('[data-bm]').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const gi=parseInt(btn.dataset.bm);
      saved[gi]=!saved[gi];
      render();
    });
  });
}

render();
</script>
</body>
</html>
